
# 利用描述文件屏蔽IOS更新提醒
; https://app.initnil.com/tvOS.mobileconfig
# 建议在「其他设置」里「GeoLite2」的「来源」填写使用下面链接，并开启「自动更新」
; https://raw.githubusercontent.com/Loyalsoldier/geoip/release/Country.mmdb
; https://raw.githubusercontent.com/Hackl0us/GeoIP2-CN/release/Country.mmdb
# 解锁网易云灰色音乐，获取证书链接(下列二选一下载安装即可)
; https://raw.githubusercontent.com/nondanee/UnblockNeteaseMusic/master/ca.crt
;https://cdn.jsdelivr.net/gh/nondanee/UnblockNeteaseMusic@master/ca.crt
# > QuantumultX图标库订阅，打开以下URL，手机端点击图片即可快捷添加「1.0.30+」
; https://github.com/ddgksf2013/Icon/blob/master/README.md
# > 推荐使用的旧版应用如下链接所示
; https://docs.qq.com/sheet/DYmRTQXpVY0hNcGls?tab=y6do1j
# > QuantumultX设置推荐
; 「通知」栏中，建议仅开启[策略检测通知]和[脚本通知]开关，「VPN」栏中，建议关闭[兼容性增强]、[分流匹配优化]和[MPM]开关
[general]
profile_img_url=https://raw.githubusercontent.com/chxm1023/Script_X/main/icon/ddm.png
server_check_url=http://cp.cloudflare.com/generate_204
resource_parser_url=https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# 显示名称-详细地址-国旗
;geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/I-am-R-E/Functional-Store-Hub/Master/GeoLocationChecker/QuantumultX/IP-API.js
# 中文显示地区
;geo_location_checker=http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
# 显示名称及无国旗
;geo_location_checker=http://extreme-ip-lookup.com/json/, https://raw.githubusercontent.com/crossutility/Quantumult-X/master/sample-location-with-script.js
# 显示英文名称及国旗
;geo_location_checker=http://ifconfig.co/json, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IPConfig.js
excluded_routes=239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32
udp_whitelist=1-442, 444-65535
dns_exclusion_list=*.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn,*.localnetwork.uop, *.qq.com, qq.com
# UDP回退策略
fallback_udp_policy=direct

# UDP丢弃列表
udp_drop_list = 443
# 第一个filter为4g模式开启规则分流，第二个filter为其他wifi下开启规则分流，第三个wifi1修改成你路由器翻墙的wifi名开启直连模式，第四个wifi2为你公司或者其他有路由器翻墙的WiFi名走直连）
#默认关闭根据wifi切换模式，如需开启，删除下方的"#"即可
;running_mode_trigger=filter, filter, wifi1:all_direct, wifi2: all_direct
[dns]
# 禁用系统DNS/IPv6
no-system
no-ipv6
# 自定义DNS服务器
server=114.114.114.114
server=202.141.176.93 
server=202.141.178.13
server=117.50.10.10
server=223.5.5.5
server=119.29.29.29
server=119.28.28.28
# 指定域名解析DNS
server=/*.baidu.com/180.76.76.76
server=/*.icloud.com/119.29.29.29
server=/*.icloud.com.cn/119.29.29.29
server=/*.tencent.com/119.29.29.29
server=/*.weixin.com/119.29.29.29
# 自定义 DoH 服务器
doh-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query
